name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  jsr-validation:
    name: JSR slow-types check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dry-run jsr publish (validates jsr.json + slow-types)
        run: npx --yes jsr publish --dry-run --allow-dirty
