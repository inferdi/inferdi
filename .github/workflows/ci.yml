name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node == '22'
        uses: codecov/codecov-action@v5
        with:
          files: ./packages/inferdi/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - run: pnpm run test:types

  jsr-validation:
    name: JSR slow-types check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dry-run jsr publish (validates jsr.json + slow-types)
        run: pnpm dlx jsr publish --dry-run --allow-dirty
        working-directory: packages/inferdi
