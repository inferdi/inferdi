name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.19', '22', '24']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node == '22'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./packages/inferdi/coverage/lcov.info,./packages/fastify/coverage/lcov.info,./packages/hono/coverage/lcov.info,./packages/koa/coverage/lcov.info,./packages/express/coverage/lcov.info,./packages/elysia/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - run: pnpm run test:types

  jsr-validation:
    name: JSR slow-types check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [inferdi, fastify, hono, koa, express, elysia]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - run: pnpm install --frozen-lockfile

      - name: Dry-run jsr publish (validates jsr.json + slow-types)
        run: pnpm dlx jsr publish --dry-run --allow-dirty
        working-directory: packages/${{ matrix.package }}
