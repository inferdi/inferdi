name: Publish

# Triggers on a semver tag like v1.0.1. The version embedded in the tag must
# match every published package manifest — the `verify` job enforces this.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    name: Verify versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: check
        name: Tag must match all package.json and jsr.json versions
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          for MANIFEST in \
            packages/inferdi/package.json \
            packages/inferdi/jsr.json \
            packages/fastify/package.json \
            packages/fastify/jsr.json \
            packages/hono/package.json \
            packages/hono/jsr.json \
            packages/koa/package.json \
            packages/koa/jsr.json \
            packages/express/package.json \
            packages/express/jsr.json \
            packages/elysia/package.json \
            packages/elysia/jsr.json
          do
            VERSION=$(node -p "require('./$MANIFEST').version")
            echo "tag=$TAG $MANIFEST=$VERSION"
            if [ "$TAG" != "$VERSION" ]; then
              echo "::error::Tag v$TAG does not match $MANIFEST version $VERSION"
              exit 1
            fi
          done
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  publish-jsr:
    name: Publish to JSR
    needs: verify
    runs-on: ubuntu-latest
    # `id-token: write` is the OIDC permission JSR uses to bind this run to the
    # publish event in its public transparency log — this is what earns the
    # "Has provenance" score on jsr.io.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - run: pnpm install --frozen-lockfile

      - name: Publish @inferdi/inferdi ${{ needs.verify.outputs.version }} to JSR
        working-directory: packages/inferdi
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if curl -fsSL "https://jsr.io/@inferdi/inferdi/meta.json" | grep -q "\"$VERSION\""; then
            echo "::notice::@inferdi/inferdi@$VERSION already on JSR, skipping"
          else
            pnpm dlx jsr publish
          fi

      - name: Publish @inferdi/fastify ${{ needs.verify.outputs.version }} to JSR
        working-directory: packages/fastify
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if curl -fsSL "https://jsr.io/@inferdi/fastify/meta.json" | grep -q "\"$VERSION\""; then
            echo "::notice::@inferdi/fastify@$VERSION already on JSR, skipping"
          else
            pnpm dlx jsr publish
          fi

      - name: Publish @inferdi/hono ${{ needs.verify.outputs.version }} to JSR
        working-directory: packages/hono
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if curl -fsSL "https://jsr.io/@inferdi/hono/meta.json" | grep -q "\"$VERSION\""; then
            echo "::notice::@inferdi/hono@$VERSION already on JSR, skipping"
          else
            pnpm dlx jsr publish
          fi

      - name: Publish @inferdi/koa ${{ needs.verify.outputs.version }} to JSR
        working-directory: packages/koa
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if curl -fsSL "https://jsr.io/@inferdi/koa/meta.json" | grep -q "\"$VERSION\""; then
            echo "::notice::@inferdi/koa@$VERSION already on JSR, skipping"
          else
            pnpm dlx jsr publish
          fi

      - name: Publish @inferdi/express ${{ needs.verify.outputs.version }} to JSR
        working-directory: packages/express
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if curl -fsSL "https://jsr.io/@inferdi/express/meta.json" | grep -q "\"$VERSION\""; then
            echo "::notice::@inferdi/express@$VERSION already on JSR, skipping"
          else
            pnpm dlx jsr publish
          fi

      - name: Publish @inferdi/elysia ${{ needs.verify.outputs.version }} to JSR
        working-directory: packages/elysia
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if curl -fsSL "https://jsr.io/@inferdi/elysia/meta.json" | grep -q "\"$VERSION\""; then
            echo "::notice::@inferdi/elysia@$VERSION already on JSR, skipping"
          else
            pnpm dlx jsr publish
          fi

  publish-npm:
    name: Publish to npm (with provenance)
    needs: verify
    runs-on: ubuntu-latest
    # OIDC token request — npm Trusted Publishing exchanges this for a short-lived
    # scoped publish token, no NPM_TOKEN required. Same permission also drives
    # provenance attestation in sigstore.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      # `prepublishOnly` runs clean → typecheck → build for each package.
      - name: Publish @inferdi/inferdi ${{ needs.verify.outputs.version }} to npm
        working-directory: packages/inferdi
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if npm view "@inferdi/inferdi@$VERSION" version > /dev/null 2>&1; then
            echo "::notice::@inferdi/inferdi@$VERSION already on npm, skipping"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi

      - name: Publish @inferdi/fastify ${{ needs.verify.outputs.version }} to npm
        working-directory: packages/fastify
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if npm view "@inferdi/fastify@$VERSION" version > /dev/null 2>&1; then
            echo "::notice::@inferdi/fastify@$VERSION already on npm, skipping"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi

      - name: Publish @inferdi/hono ${{ needs.verify.outputs.version }} to npm
        working-directory: packages/hono
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if npm view "@inferdi/hono@$VERSION" version > /dev/null 2>&1; then
            echo "::notice::@inferdi/hono@$VERSION already on npm, skipping"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi

      - name: Publish @inferdi/koa ${{ needs.verify.outputs.version }} to npm
        working-directory: packages/koa
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if npm view "@inferdi/koa@$VERSION" version > /dev/null 2>&1; then
            echo "::notice::@inferdi/koa@$VERSION already on npm, skipping"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi

      - name: Publish @inferdi/express ${{ needs.verify.outputs.version }} to npm
        working-directory: packages/express
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if npm view "@inferdi/express@$VERSION" version > /dev/null 2>&1; then
            echo "::notice::@inferdi/express@$VERSION already on npm, skipping"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi

      - name: Publish @inferdi/elysia ${{ needs.verify.outputs.version }} to npm
        working-directory: packages/elysia
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if npm view "@inferdi/elysia@$VERSION" version > /dev/null 2>&1; then
            echo "::notice::@inferdi/elysia@$VERSION already on npm, skipping"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi
