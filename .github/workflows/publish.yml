name: Publish

# Triggers on a semver tag like v1.0.1. The version embedded in the tag must
# match every published package manifest — the `verify` job enforces this.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    name: Verify versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Tag must match all package.json and jsr.json versions
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          for MANIFEST in \
            packages/inferdi/package.json \
            packages/inferdi/jsr.json \
            packages/fastify/package.json \
            packages/fastify/jsr.json
          do
            VERSION=$(node -p "require('./$MANIFEST').version")
            echo "tag=$TAG $MANIFEST=$VERSION"
            if [ "$TAG" != "$VERSION" ]; then
              echo "::error::Tag v$TAG does not match $MANIFEST version $VERSION"
              exit 1
            fi
          done
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  publish-jsr:
    name: Publish to JSR
    needs: verify
    runs-on: ubuntu-latest
    # `id-token: write` is the OIDC permission JSR uses to bind this run to the
    # publish event in its public transparency log — this is what earns the
    # "Has provenance" score on jsr.io.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Publish @inferdi/inferdi ${{ needs.verify.outputs.version }} to JSR
        run: pnpm dlx jsr publish
        working-directory: packages/inferdi

      - name: Publish @inferdi/fastify ${{ needs.verify.outputs.version }} to JSR
        run: pnpm dlx jsr publish
        working-directory: packages/fastify

  publish-npm:
    name: Publish to npm (with provenance)
    needs: verify
    runs-on: ubuntu-latest
    # OIDC token request — npm Trusted Publishing exchanges this for a short-lived
    # scoped publish token, no NPM_TOKEN required. Same permission also drives
    # provenance attestation in sigstore.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # `prepublishOnly` runs clean → typecheck → build for each package.
      - name: Publish @inferdi/inferdi ${{ needs.verify.outputs.version }} to npm
        run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/inferdi

      - name: Publish @inferdi/fastify ${{ needs.verify.outputs.version }} to npm
        run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/fastify
