name: Publish

# Triggers on a semver tag like v1.0.1. The version embedded in the tag must
# match both packages/inferdi/package.json and packages/inferdi/jsr.json — the `verify` job enforces this.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    name: Verify versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Tag must match package.json AND jsr.json
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./packages/inferdi/package.json').version")
          JSR=$(node -p "require('./packages/inferdi/jsr.json').version")
          echo "tag=$TAG packages/inferdi/package.json=$PKG packages/inferdi/jsr.json=$JSR"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match packages/inferdi/package.json version $PKG"
            exit 1
          fi
          if [ "$TAG" != "$JSR" ]; then
            echo "::error::Tag v$TAG does not match packages/inferdi/jsr.json version $JSR"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  publish-jsr:
    name: Publish to JSR
    needs: verify
    runs-on: ubuntu-latest
    # `id-token: write` is the OIDC permission JSR uses to bind this run to the
    # publish event in its public transparency log — this is what earns the
    # "Has provenance" score on jsr.io.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Publish ${{ needs.verify.outputs.version }} to JSR
        run: pnpm dlx jsr publish
        working-directory: packages/inferdi

  publish-npm:
    name: Publish to npm (with provenance)
    needs: verify
    runs-on: ubuntu-latest
    # OIDC token request — npm Trusted Publishing exchanges this for a short-lived
    # scoped publish token, no NPM_TOKEN required. Same permission also drives
    # provenance attestation in sigstore.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # `prepublishOnly` (defined in packages/inferdi/package.json) runs clean → typecheck → build.
      - name: Publish ${{ needs.verify.outputs.version }} to npm
        run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/inferdi
